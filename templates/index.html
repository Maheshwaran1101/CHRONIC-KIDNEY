<!DOCTYPE html>
<html>
<head>
    <title>CKD Prediction</title>
</head>
<body>

<h2>Chronic Kidney Disease Prediction</h2>

<form action="/predict" method="post">

    <input type="text" name="age" placeholder="Age"><br>
    <input type="text" name="bp" placeholder="Blood Pressure"><br>
    <input type="text" name="sg" placeholder="Specific Gravity"><br>
    <input type="text" name="al" placeholder="Albumin"><br>
    <input type="text" name="su" placeholder="Sugar"><br>
    
    <!-- Add ALL remaining fields in SAME ORDER as training -->
    
    <input type="submit" value="Predict">

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
